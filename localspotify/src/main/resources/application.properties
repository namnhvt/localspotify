spring.application.name=localspotify
# 1. Cấu hình Server & File Upload
server.port=8080
# Cho phép upload file nhạc tối đa 50MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Upload directory for audio files
upload.dir=uploads/audio
# 2. Kết nối Database MySQL
# Đảm bảo tên database local_spotify_db khớp với script SQL
spring.datasource.url=jdbc:mysql://localhost:3306/local_spotify_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=nampro9x
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 3. Cấu hình Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

