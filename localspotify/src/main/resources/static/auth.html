<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Spotify - Đăng nhập</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div id="login-form" class="auth-box active">
            <h2>Đăng nhập vào Local Spotify</h2>
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="login-username" required placeholder="Nhập tên đăng nhập">
                </div>
                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="login-password" required placeholder="Nhập mật khẩu">
                </div>
                <button type="submit" class="btn-submit">ĐĂNG NHẬP</button>
            </form>
            <p class="toggle-text">Chưa có tài khoản? <span onclick="toggleForm('register')">Đăng ký ngay</span></p>
        </div>

        <div id="register-form" class="auth-box">
            <h2>Tạo tài khoản mới</h2>
            <form onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="reg-username" required placeholder="Chọn tên đăng nhập">
                </div>
                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="reg-password" required placeholder="Tạo mật khẩu">
                </div>
                <button type="submit" class="btn-submit">ĐĂNG KÝ</button>
            </form>
            <p class="toggle-text">Đã có tài khoản? <span onclick="toggleForm('login')">Đăng nhập</span></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
